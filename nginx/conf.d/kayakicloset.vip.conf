upstream frontend_app {
    server frontend:80;
}

upstream backend_api {
    server backend:8000;
}

# 前端：kayakicloset.vip
server {
    listen 80;
    server_name kayakicloset.vip www.kayakicloset.vip;

    location ~ ^/\.well-known/acme-challenge/(?<token>.+)$ {
        return 302 https://app.certkit.io/http-challenge/free/9d54bba210e9483abbd008845ead8656/$token;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name kayakicloset.vip www.kayakicloset.vip;

    ssl_certificate     /etc/nginx/certs/kayakicloset.vip/certificate.pem;
    ssl_certificate_key /etc/nginx/certs/kayakicloset.vip/private.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
