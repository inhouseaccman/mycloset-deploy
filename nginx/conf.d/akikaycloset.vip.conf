map $host $legacy_redirect_host {
    hostnames;
    default kayakicloset.vip;
    akikaycloset.vip kayakicloset.vip;
    www.akikaycloset.vip www.kayakicloset.vip;
}

# иҲҠз¶Іеҹҹ akikaycloset.vip вҶ’ kayakicloset.vipпјҲдҝқз•ҷи·Ҝеҫ‘иҲҮ queryпјү
server {
    listen 80;
    server_name akikaycloset.vip www.akikaycloset.vip;

    location ~ ^/\.well-known/acme-challenge/(?<token>.+)$ {
        return 302 https://app.certkit.io/http-challenge/free/9d54bba210e9483abbd008845ead8656/$token;
    }

    location / {
        return 301 https://$legacy_redirect_host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name akikaycloset.vip www.akikaycloset.vip;

    ssl_certificate     /etc/nginx/certs/akikaycloset.vip/certificate.pem;
    ssl_certificate_key /etc/nginx/certs/akikaycloset.vip/private.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        return 301 https://$legacy_redirect_host$request_uri;
    }
}
